<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagersaldo Mobil</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
* { box-sizing: border-box; }

:root {
  --bg:#f4f6f8;
  --card:#fff;
  --text:#1e293b;
  --border:#e5e7eb;
}

body.dark {
  --bg:#0f172a;
  --card:rgba(255,255,255,0.05);
  --text:#fff;
  --border:rgba(255,255,255,0.1);
}

body {
  margin:0;
  font-family:"Segoe UI";
  background:var(--bg);
  color:var(--text);
}

.container {
  padding:12px;
  max-width:600px;
  margin:auto;
}

h2 { text-align:center; }

button {
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  width:100%;
  margin:5px 0;
}

input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  margin-bottom:8px;
  font-size:16px;
}

.card {
  background:var(--card);
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

.card.out { background:rgba(255,0,0,0.1); }

.small { font-size:13px; opacity:0.7; }

.meta {
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}

.meta div:first-child {
  cursor:pointer;
  text-decoration: underline;
}

.status-ok { color:#22c55e; font-weight:bold; }
.status-out { color:#ef4444; font-weight:bold; }

#login-container {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

#productForm { display:none; }
#productForm.show { display:block; }

.actions {
  display:flex;
  gap:5px;
  margin-top:8px;
}

.actions button { flex:1; }

.pick-btn { background:#f59e0b; color:#fff; }
.delete-btn { background:#ef4444; color:#fff; }

/* MODAL */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
  font-family:'Comic Sans MS', cursive;
}

.modal.show { display:flex; }

.modal-content {
  background:#0f172ab8;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:300px;
  text-align:center;
  font-size:1.2em;
}

.modal-actions {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.modal-actions button { flex:1; }

#confirmYes { background:#22c55e; color:white; }
#confirmNo { background:#ef4444; color:white; }

.opencamerastyle{
  margin: 0px;
  margin-bottom: 8px;
  cursor: pointer;
}

.visabild{
  background-color: transparent;
  margin: 0;
  cursor: pointer;
  padding: 0px;
}
</style>
</head>

<body>

<div id="login-container">
  <h2>🔒 Logga in</h2>
  <input id="login-username" placeholder="Användarnamn">
  <input id="login-password" type="password" placeholder="Lösenord">
  <button onclick="login()">Logga in</button>
</div>

<div class="container" id="app-container" style="display:none;">
  <h2>📦 Lagersaldo</h2>

  <button onclick="toggleTheme()">🌙 Dark Mode</button>
  <button id="toggleFormBtn">➕ Ny produkt</button>

  <form id="productForm">
    <input id="nameInput" placeholder="Produktnamn" required>
    <input id="articleInput" placeholder="Artikelnummer" required>
    <input id="quantityInput" type="number" placeholder="Antal" required>
    <input id="locationInput" placeholder="Lagerplats" required>
    <button type="submit">+ Lägg till</button>
  </form>

  <input id="search" placeholder="🔍 Sök...">
  <div id="productList"></div>
</div>

<!-- HIDDEN CAMERA -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

<!-- MODAL -->
<div id="confirmModal" class="modal">
  <div class="modal-content">
    <p id="confirmText"></p>
    <div class="modal-actions">
      <button id="confirmYes">Bekräfta</button>
      <button id="confirmNo">Avbryt</button>
    </div>
  </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey:"AIzaSy...",
  authDomain:"lagersystem-4f0e6.firebaseapp.com",
  databaseURL:"https://lagersystem-4f0e6-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// DARK MODE
if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark");
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

// LOGIN
function login(){
  const u=document.getElementById("login-username").value;
  const p=document.getElementById("login-password").value;

  if(u==="swapos301" && p==="ost"){
    localStorage.setItem("loggedIn","true");
    showApp();
  } else alert("Fel login");
}

function showApp(){
  document.getElementById("login-container").style.display = "none";
  document.getElementById("app-container").style.display = "block";
  loadProducts();
}

if(localStorage.getItem("loggedIn")==="true") showApp();

// FORM
document.getElementById("toggleFormBtn").onclick = () => productForm.classList.toggle("show");

// DATA
let products={};

function loadProducts(){
  db.ref("products").on("value", snap=>{
    products=snap.val()||{};
    render();
  });
}

function save(){ db.ref("products").set(products); }

// RENDER
function render(){
  const list=productList;
  const searchVal=search.value.toLowerCase();
  list.innerHTML="";

  Object.keys(products).forEach(key=>{
    const p=products[key];

    if(!(p.name||"").toLowerCase().includes(searchVal) &&
       !(p.article||"").toLowerCase().includes(searchVal)) return;

    const card=document.createElement("div");
    card.className="card";
    if(p.quantity===0) card.classList.add("out");

    card.innerHTML=`
      <input placeholder="Produktnamn" value="${p.name||""}" onblur="update('${key}','name',this.value)">
      
      <div style="display:flex; gap:5px;">
        <input style="flex:10;" placeholder="Artikelnummer" value="${p.article||""}" onblur="update('${key}','article',this.value)">
        <button class="opencamerastyle" style="flex:1;" onclick="openCamera('${key}')">📸</button>
      </div>

      <input placeholder="Antal" type="number" value="${p.quantity}" onblur="update('${key}','quantity',this.value)">
      <input placeholder="Lagerplats" value="${p.location||""}" onblur="update('${key}','location',this.value)">
      <input placeholder="Kommentar" value="${p.comment||""}" onblur="update('${key}','comment',this.value)">

      <div class="meta small">
        <div onclick="editPicked('${key}')">Plockat: ${p.picked||0}</div>
        <div style="display:flex; gap:5px; align-items:center;">
          ${p.image ? `<button class="visabild" onclick="showImage('${key}')">🖼️</button>` : ""}
          <div class="${p.quantity>0?'status-ok':'status-out'}">
            ${p.quantity>0?'Tillgänglig':'Slut'}
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="pick-btn" onclick="pick('${key}')">Plocka</button>
        <button class="delete-btn" onclick="del('${key}')">X</button>
      </div>
    `;
    list.appendChild(card);
  });
}

// UPDATE
function update(key,field,value){
  if(field==="quantity") value=parseInt(value)||0;
  products[key][field]=value;
  save();
}

// CAMERA
let currentImageKey=null;

function openCamera(key){
  currentImageKey=key;
  cameraInput.click();
}

cameraInput.addEventListener("change",e=>{
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=ev=>{
    products[currentImageKey].image=ev.target.result;
    save();
  };
  reader.readAsDataURL(file);
});

// MODAL
let confirmCallback=null;

confirmYes.onclick=()=>{
  if(confirmCallback) confirmCallback();
  closeModal();
};
confirmNo.onclick=closeModal;

function closeModal(){
  confirmModal.classList.remove("show");
  confirmCallback=null;
  confirmYes.innerText="Bekräfta";
  confirmNo.innerText="Avbryt";
}

// ACTIONS
function pick(key){
  showConfirm("Plocka till verkstaden?",()=>{
    if(products[key].quantity>0){
      products[key].quantity--;
      products[key].picked=(products[key].picked||0)+1;
      save();
    }
  });
}

function del(key){
  showConfirm("Radera produkten?",()=>{
    delete products[key];
    save();
  });
}

function editPicked(key){
  confirmText.innerText="Minska plockat med 1?";
  confirmYes.innerText="-1";
  confirmModal.classList.add("show");

  confirmCallback=()=>{
    if((products[key].picked||0)>0){
      products[key].picked--;
      save();
    }
  };
}

// IMAGE VIEW
function showImage(key){
  const img=products[key].image;

  confirmText.innerHTML=`
    <img src="${img}" style="width:100%; border-radius:10px;">
    <div></div>
  `;

  confirmYes.innerText="Radera";
  confirmNo.innerText="Stäng";
  confirmModal.classList.add("show");

  confirmCallback=()=>{
    delete products[key].image;
    save();
  };
}

function showConfirm(text,callback){
  confirmText.innerText=text;
  confirmModal.classList.add("show");
  confirmCallback=callback;
}

// ADD
productForm.addEventListener("submit",e=>{
  e.preventDefault();
  const key=Date.now();

  products[key]={
    name:nameInput.value,
    article:articleInput.value,
    quantity:parseInt(quantityInput.value)||0,
    location:locationInput.value,
    picked:0,
    comment:""
  };

  save();
  e.target.reset();
  productForm.classList.remove("show");
});

search.addEventListener("input",render);
</script>
</body>
</html>
