<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Lagersaldo Firebase Inline Edit</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #1e293b;
  --accent: #008724;
  --border: #e5e7eb;
  --neon: #fff500;
}

body.dark {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.05);
  --text: #ffffff;
  --accent: #008724;
  --border: rgba(255,255,255,0.1);
  --neon: #fff500;
}

body { font-family:"Segoe UI",sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; transition:.3s; }
.container { max-width:1100px; margin:auto; background:var(--card); padding:25px; border-radius:12px; }
h1{text-align:center;}
.top-bar{display:flex;gap:10px;margin-bottom:10px;}
.toggle-btn, .show-form-btn{background:var(--accent);color:white;border:none;padding:10px;cursor:pointer;border-radius:6px;}
form{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0;}
input{padding:10px;border-radius:6px;border:1px solid var(--border);text-align:center;background:transparent;color:var(--text);transition:.2s;}
input.neon-input{border:2px solid var(--neon);box-shadow:0 0 8px var(--neon);}
.add-btn, .save-btn-inline{grid-column:span 2;background:var(--accent);color:white;border:none;padding:10px;cursor:pointer;border-radius:6px;}
#search{width:100%;margin-bottom:15px;}
table{width:100%;border-collapse:collapse;text-align:center;}
th{background:var(--accent);color:white;padding:12px;}
td{padding:10px;border-bottom:1px solid var(--border);}
tr.out-of-stock{background:rgba(255,0,0,0.1);}
.comment-box{cursor:text;padding:5px;}
.comment-input,.edit-input{width:90%;padding:5px;text-align:center;border:2px solid var(--neon);box-shadow:0 0 6px var(--neon);}
button{padding:6px;border:none;border-radius:5px;cursor:pointer;}
.pick-btn{background:#f59e0b;color:white;}
.delete-btn{background:#ef4444;color:white;}
.save-btn-inline{background:#22c55e;color:white;}
form.hidden{display:none;}
.container.hidden{display:none;}
</style>
</head>

<body>

<div class="container" id="login-container">
  <h1>🔒 Logga in</h1>
  <input type="text" id="login-username" placeholder="Användarnamn"><br><br>
  <input type="password" id="login-password" placeholder="Lösenord"><br><br>
  <button onclick="login()">Logga in</button>
</div>

<div class="container hidden" id="app-container">
  <h1>📦 Lagersaldo</h1>
  <div class="top-bar">
    <button class="toggle-btn" onclick="toggleTheme()">🌙 / ☀️</button>
    <button class="show-form-btn" onclick="toggleForm()">➕ Lägg till artikel</button>
  </div>

  <form id="productForm" class="hidden">
    <input type="text" id="name" placeholder="Produktnamn" required>
    <input type="text" id="article" placeholder="Artikelnummer" required>
    <input type="number" id="quantity" placeholder="Antal" required>
    <input type="text" id="location" placeholder="Lagerplats" required>
    <button type="submit" class="add-btn">+ Lägg till</button>
  </form>

  <input type="text" id="search" placeholder="🔍 Sök...">

  <table>
    <thead>
      <tr>
        <th>Namn</th>
        <th>Artikel</th>
        <th>Antal</th>
        <th>Lagerplats</th>
        <th>Plockat</th>
        <th>Kommentar</th>
        <th>Åtgärder</th>
      </tr>
    </thead>
    <tbody id="productList"></tbody>
  </table>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBYpgWLwCbSVRjao4Umd4odH-qifRAQfDI",
  authDomain: "lagersystem-4f0e6.firebaseapp.com",
  databaseURL: "https://lagersystem-4f0e6-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "lagersystem-4f0e6",
  storageBucket: "lagersystem-4f0e6.firebasestorage.app",
  messagingSenderId: "928284998538",
  appId: "1:928284998538:web:139931d6588672f2f4e673",
  measurementId: "G-2MQ9PQLJE8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LOGIN
const USER="swapos301",PASS="ost";
function login(){
  const u=document.getElementById("login-username").value;
  const p=document.getElementById("login-password").value;
  if(u===USER && p===PASS){ localStorage.setItem("loggedIn","true"); showApp(); }
  else alert("Fel användarnamn eller lösenord");
}
function showApp(){
  document.getElementById("login-container").classList.add("hidden");
  document.getElementById("app-container").classList.remove("hidden");
  loadProducts();
}
if(localStorage.getItem("loggedIn")==="true") showApp();

// THEME
function toggleTheme(){ document.body.classList.toggle("dark"); }

// FORM
function toggleForm(){ document.getElementById("productForm").classList.toggle("hidden"); }

// PRODUCTS
let products={},editingKey=null;

function loadProducts(){
  db.ref("products").on("value", snapshot=>{
    products=snapshot.val()||{};
    Object.keys(products).forEach(k=>{
      if(products[k].quantity>0 && (!products[k].comment || products[k].comment==="Slut")) products[k].comment="Tillgänglig";
      if(products[k].quantity===0) products[k].comment="Slut";
    });
    render();
  });
}

function saveProducts(){ db.ref("products").set(products); }

function render(){
  const list=document.getElementById("productList");
  const search=document.getElementById("search").value.toLowerCase();
  list.innerHTML="";
  Object.keys(products).forEach(key=>{
    const p=products[key];
    if(!p.picked)p.picked=0;
    if(!p.comment)p.comment=p.quantity>0?"Tillgänglig":"Slut";
    if((p.name&&p.name.toLowerCase().includes(search))||(p.article&&p.article.toLowerCase().includes(search))||(p.location&&p.location.toLowerCase().includes(search))){
      const row=document.createElement("tr");
      if(p.quantity===0)row.classList.add("out-of-stock");

      if(editingKey===key){
        row.innerHTML=`
          <td><input class="edit-input neon-input" id="edit-name" value="${p.name}"></td>
          <td><input class="edit-input neon-input" id="edit-article" value="${p.article}"></td>
          <td><input class="edit-input neon-input" id="edit-quantity" type="number" value="${p.quantity}"></td>
          <td><input class="edit-input neon-input" id="edit-location" value="${p.location}"></td>
          <td>${p.picked}</td>
          <td><input class="edit-input neon-input" id="edit-comment" value="${p.comment}"></td>
          <td><button class="save-btn-inline" onclick="saveEdit('${key}')">Spara</button></td>
        `;
      }else{
        row.innerHTML=`
          <td>${p.name}</td>
          <td>${p.article}</td>
          <td>${p.quantity}</td>
          <td>${p.location}</td>
          <td>${p.picked}</td>
          <td><div class="comment-box" onclick="editComment('${key}')">${p.comment}</div></td>
          <td>
            <button onclick="startEdit('${key}')">✏️</button>
            <button class="pick-btn" onclick="pickOne('${key}')">Plocka</button>
            <button class="delete-btn" onclick="deleteProduct('${key}')">X</button>
          </td>
        `;
      }
      list.appendChild(row);
    }
  });
}

// ACTIONS
function pickOne(key){
  if(products[key].quantity>0){ 
    products[key].quantity--; 
    products[key].picked++; 
    products[key].comment = products[key].quantity>0?"Tillgänglig":"Slut";
    saveProducts(); render();
  }
}

function startEdit(key){ editingKey=key; render(); }

function saveEdit(key){
  const p=products[key];
  p.name=document.getElementById("edit-name").value;
  p.article=document.getElementById("edit-article").value;
  p.quantity=parseInt(document.getElementById("edit-quantity").value);
  p.location=document.getElementById("edit-location").value;
  const c=document.getElementById("edit-comment").value;
  p.comment=c || (p.quantity>0?"Tillgänglig":"Slut");
  editingKey=null; saveProducts(); render();
}

function editComment(key){
  const cell=document.querySelector(`div[onclick="editComment('${key}')"]`);
  cell.innerHTML=`<input class="comment-input neon-input" id="c-${key}" value="${products[key].comment}">`;
  const input=document.getElementById(`c-${key}`);
  input.focus();
  input.addEventListener("blur",()=>{
    products[key].comment=input.value|| (products[key].quantity>0?"Tillgänglig":"Slut");
    saveProducts(); render();
  });
}

function deleteProduct(key){ delete products[key]; saveProducts(); render(); }

document.getElementById("productForm").addEventListener("submit",e=>{
  e.preventDefault();
  const nameInput=document.getElementById("name");
  const articleInput=document.getElementById("article");
  const quantityInput=document.getElementById("quantity");
  const locationInput=document.getElementById("location");
  if(!nameInput.value || !articleInput.value || !quantityInput.value || !locationInput.value){ alert("Fyll i alla fält!"); return; }
  const key=Date.now().toString();
  products[key]={ 
    name:nameInput.value,
    article:articleInput.value,
    quantity:parseInt(quantityInput.value),
    location:locationInput.value,
    picked:0,
    comment:quantityInput.value>0?"Tillgänglig":"Slut"
  };
  saveProducts(); render();
  e.target.reset(); toggleForm();
});

document.getElementById("search").addEventListener("input",render);
</script>

</body>
</html>
