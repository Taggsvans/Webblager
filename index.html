<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Lagersaldo Firebase</title>
<style>
:root {
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #1e293b;
  --accent: #2563eb;
  --border: #e5e7eb;
}

body.dark {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.05);
  --text: #ffffff;
  --accent: #00f0ff;
  --border: rgba(255,255,255,0.1);
}

body {
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 20px;
  transition: 0.3s;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: var(--card);
  padding: 25px;
  border-radius: 12px;
}

h1 { text-align: center; }

.top-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.toggle-btn, .show-form-btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
}

form {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 10px 0;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  text-align: center;
  background: transparent;
  color: var(--text);
}

.add-btn { 
  grid-column: span 2;
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

#search { width: 100%; margin-bottom: 15px; }

table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
}

th {
  background: var(--accent);
  color: white;
  padding: 12px;
}

td {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

tr.out-of-stock { background: rgba(255,0,0,0.1); }

.comment-box { cursor: text; padding: 5px; }

.comment-input { width: 90%; padding: 5px; text-align: center; }

button { padding: 6px; border: none; border-radius: 5px; cursor: pointer; }
.pick-btn { background: #f59e0b; color: white; }
.delete-btn { background: #ef4444; color: white; }
.save-btn { background: #22c55e; color: white; }

form.hidden { display: none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login-container">
  <h1>🔒 Logga in</h1>
  <input type="text" id="login-username" placeholder="Användarnamn"><br><br>
  <input type="password" id="login-password" placeholder="Lösenord"><br><br>
  <button onclick="login()">Logga in</button>
</div>

<!-- APP -->
<div class="container hidden" id="app-container">
  <h1>📦 Lagersaldo</h1>

  <div class="top-bar">
    <button class="toggle-btn" onclick="toggleTheme()">🌙 / ☀️</button>
    <button class="show-form-btn" onclick="toggleForm()">➕ Lägg till artikel</button>
  </div>

  <form id="productForm" class="hidden">
    <input type="text" id="name" placeholder="Produktnamn" required>
    <input type="text" id="article" placeholder="Artikelnummer" required>
    <input type="number" id="quantity" placeholder="Antal" required>
    <input type="text" id="location" placeholder="Lagerplats" required>
    <button class="add-btn" type="submit">+ Lägg till</button>
  </form>

  <input type="text" id="search" placeholder="🔍 Sök...">

  <table>
    <thead>
      <tr>
        <th>Namn</th>
        <th>Artikel</th>
        <th>Antal</th>
        <th>Plockat</th>
        <th>Kommentar</th>
        <th>Åtgärder</th>
      </tr>
    </thead>
    <tbody id="productList"></tbody>
  </table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyBYpgWLwCbSVRjao4Umd4odH-qifRAQfDI",
  authDomain: "lagersystem-4f0e6.firebaseapp.com",
  databaseURL: "https://lagersystem-4f0e6-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "lagersystem-4f0e6",
  storageBucket: "lagersystem-4f0e6.firebasestorage.app",
  messagingSenderId: "928284998538",
  appId: "1:928284998538:web:139931d6588672f2f4e673",
  measurementId: "G-2MQ9PQLJE8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== LOGIN =====
const USER="swapos301", PASS="ost";
function login(){
  const u = document.getElementById("login-username").value;
  const p = document.getElementById("login-password").value;
  if(u===USER && p===PASS){
    document.getElementById("login-container").classList.add("hidden");
    document.getElementById("app-container").classList.remove("hidden");
    loadProducts();
  } else alert("Fel användarnamn eller lösenord");
}

// ===== THEME =====
function toggleTheme(){ document.body.classList.toggle("dark"); }
(function(){ if(localStorage.getItem("theme")==="dark") document.body.classList.add("dark"); })();
function toggleForm(){ document.getElementById("productForm").classList.toggle("hidden"); }

// ===== PRODUCTS =====
let products = {};
let editingKey = null;

const list = document.getElementById("productList");
const searchInput = document.getElementById("search");

// Ladda produkter från Firebase
function loadProducts(){
  db.ref("products").on("value", snapshot=>{
    products = snapshot.val() || {};
    render();
  });
}

function saveProducts(){
  db.ref("products").set(products);
}

// RENDER
function render(){
  const search = searchInput.value.toLowerCase();
  list.innerHTML="";
  Object.keys(products).forEach(key=>{
    const p = products[key];
    if(!p.comment) p.comment="";
    if(!p.picked) p.picked=0;

    if((p.name && p.name.toLowerCase().includes(search)) ||
       (p.article && p.article.toLowerCase().includes(search)) ||
       (p.location && p.location.toLowerCase().includes(search))){
      const row = document.createElement("tr");
      if(p.quantity===0) row.classList.add("out-of-stock");

      row.innerHTML=`
        <td>${p.name}</td>
        <td>${p.article}</td>
        <td>${p.quantity}</td>
        <td>${p.picked}</td>
        <td><div class="comment-box" onclick="editComment('${key}')">${p.comment||'➕'}</div></td>
        <td>
          <button onclick="editProduct('${key}')">✏️</button>
          <button class="pick-btn" onclick="pickOne('${key}')">Plocka</button>
          <button class="delete-btn" onclick="deleteProduct('${key}')">X</button>
        </td>
      `;
      list.appendChild(row);
    }
  });
}

// ===== ACTIONS =====
function pickOne(key){ if(products[key].quantity>0){ products[key].quantity--; products[key].picked++; saveProducts(); render(); } }

function editComment(key){
  const cell = list.querySelector(`div[onclick="editComment('${key}')"]`);
  cell.innerHTML=`<input class="comment-input" id="c-${key}" value="${products[key].comment}">`;
  const input=document.getElementById(`c-${key}`);
  input.focus();
  input.addEventListener("blur",()=>{ products[key].comment=input.value; saveProducts(); render(); });
}

function editProduct(key){
  const p = products[key];
  editingKey=key;
  document.getElementById("productForm").classList.remove("hidden");
  document.getElementById("name").value = p.name;
  document.getElementById("article").value = p.article;
  document.getElementById("quantity").value = p.quantity;
  document.getElementById("location").value = p.location;
  document.querySelector("#productForm button").textContent = "💾 Spara";
}

function deleteProduct(key){ delete products[key]; saveProducts(); render(); }

// ===== ADD / SAVE PRODUCT =====
document.getElementById("productForm").addEventListener("submit", e=>{
  e.preventDefault();
  const nameInput=document.getElementById("name");
  const articleInput=document.getElementById("article");
  const quantityInput=document.getElementById("quantity");
  const locationInput=document.getElementById("location");

  if(!nameInput.value || !articleInput.value || !quantityInput.value || !locationInput.value){
    alert("Fyll i alla fält!"); return;
  }

  if(editingKey){
    products[editingKey].name=nameInput.value;
    products[editingKey].article=articleInput.value;
    products[editingKey].quantity=parseInt(quantityInput.value);
    products[editingKey].location=locationInput.value;
    editingKey=null;
  } else {
    const key=Date.now().toString();
    products[key]={
      name:nameInput.value,
      article:articleInput.value,
      quantity:parseInt(quantityInput.value),
      location:locationInput.value,
      picked:0,
      comment:""
    };
  }

  saveProducts();
  render();
  e.target.reset();
  document.getElementById("productForm").classList.add("hidden");
  document.querySelector("#productForm button").textContent = "+ Lägg till";
});

searchInput.addEventListener("input", render);

</script>
</body>
</html>
