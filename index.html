<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Lagersaldo</title>

<style>
:root {
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #1e293b;
  --accent: #2563eb;
  --border: #e5e7eb;
}

body.dark {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.05);
  --text: #ffffff;
  --accent: #00f0ff;
  --border: rgba(255,255,255,0.1);
}

body {
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 20px;
  transition: 0.3s;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: var(--card);
  padding: 25px;
  border-radius: 12px;
}

h1 { text-align: center; }

.top-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.toggle-btn, .show-form-btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
}

form {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 10px 0;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  text-align: center;
  background: transparent;
  color: var(--text);
}

.add-btn { 
  grid-column: span 2;
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

#search { width: 100%; margin-bottom: 15px; }

table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
}

th {
  background: var(--accent);
  color: white;
  padding: 12px;
}

td {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

tr.out-of-stock { background: rgba(255,0,0,0.1); }

.comment-box { cursor: text; padding: 5px; }

.comment-input { width: 90%; padding: 5px; text-align: center; }

button { padding: 6px; border: none; border-radius: 5px; cursor: pointer; }
.pick-btn { background: #f59e0b; color: white; }
.delete-btn { background: #ef4444; color: white; }
.save-btn { background: #22c55e; color: white; }

form.hidden { display: none; }
</style>
</head>

<body>
<div class="container">
  <h1>📦 Lagersaldo</h1>

  <div class="top-bar">
    <button class="toggle-btn" onclick="toggleTheme()">🌙 / ☀️</button>
    <button class="show-form-btn" onclick="toggleForm()">➕ Lägg till artikel</button>
  </div>

  <form id="productForm" class="hidden">
    <input type="text" id="name" placeholder="Produktnamn" required>
    <input type="text" id="article" placeholder="Artikelnummer" required>
    <input type="number" id="quantity" placeholder="Antal" required>
    <input type="text" id="location" placeholder="Lagerplats" required>
    <button class="add-btn">+ Lägg till</button>
  </form>

  <input type="text" id="search" placeholder="🔍 Sök...">

  <table>
    <thead>
      <tr>
        <th>Namn</th>
        <th>Artikel</th>
        <th>Antal</th>
        <th>Plockat</th>
        <th>Kommentar</th>
        <th>Åtgärder</th>
      </tr>
    </thead>
    <tbody id="productList"></tbody>
  </table>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let editingIndex = null;

const list = document.getElementById("productList");
const searchInput = document.getElementById("search");
const form = document.getElementById("productForm");

/* THEME */
function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}
(function loadTheme() {
  if (localStorage.getItem("theme") === "dark") document.body.classList.add("dark");
})();

/* SHOW/HIDE FORM */
function toggleForm() {
  form.classList.toggle("hidden");
}

/* DATA */
function save() { localStorage.setItem("products", JSON.stringify(products)); }

function render() {
  const search = searchInput.value.toLowerCase();
  list.innerHTML = "";

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(search) ||
    p.article.toLowerCase().includes(search) ||
    p.location.toLowerCase().includes(search)
  );

  filtered.forEach((p, index) => {
    if (p.picked === undefined) p.picked = 0;
    if (!p.comment) p.comment = "";

    const realIndex = products.indexOf(p);
    const row = document.createElement("tr");

    if (p.quantity === 0) row.classList.add("out-of-stock");
    if (editingIndex === realIndex) row.classList.add("editing");

    if (editingIndex === realIndex) {
      row.innerHTML = `
        <td><input class="edit-input" id="edit-name" value="${p.name}"></td>
        <td><input class="edit-input" id="edit-article" value="${p.article}"></td>
        <td><input class="edit-input" id="edit-quantity" type="number" value="${p.quantity}"></td>
        <td>${p.picked}</td>
        <td>${p.comment}</td>
        <td><button class="save-btn" onclick="saveEdit(${realIndex})">Spara</button></td>
      `;
    } else {
      row.innerHTML = `
        <td>${p.name}</td>
        <td>${p.article}</td>
        <td>${p.quantity}</td>
        <td>${p.picked}</td>
        <td>
          <div class="comment-box" onclick="editComment(${realIndex})">
            ${p.comment || "➕"}
          </div>
        </td>
        <td>
          <button onclick="editProduct(${realIndex})">✏️</button>
          <button class="pick-btn" onclick="pickOne(${realIndex})">Plocka</button>
          <button class="delete-btn" onclick="deleteProduct(${realIndex})">X</button>
        </td>
      `;
    }

    list.appendChild(row);
  });
}

function editProduct(index) {
  editingIndex = index;
  render();
}

function saveEdit(index) {
  products[index].name = document.getElementById("edit-name").value;
  products[index].article = document.getElementById("edit-article").value;
  products[index].quantity = parseInt(document.getElementById("edit-quantity").value);
  editingIndex = null;
  save();
  render();
}

function pickOne(index) {
  if (products[index].quantity > 0) {
    products[index].quantity--;
    products[index].picked++;
    save();
    render();
  }
}

function editComment(index) {
  const row = list.children[index];
  const cell = row.children[4];
  cell.innerHTML = `<input class="comment-input" id="comment-${index}" value="${products[index].comment}">`;
  const input = document.getElementById(`comment-${index}`);
  input.focus();
  input.addEventListener("blur", () => {
    products[index].comment = input.value;
    save();
    render();
  });
}

function deleteProduct(index) {
  products.splice(index, 1);
  save();
  render();
}

document.getElementById("productForm").addEventListener("submit", e => {
  e.preventDefault();
  products.push({
    name: name.value,
    article: article.value,
    quantity: parseInt(quantity.value),
    location: location.value,
    picked: 0,
    comment: ""
  });
  save();
  render();
  e.target.reset();
  form.classList.add("hidden"); // döljer formuläret igen efter lägg till
});

searchInput.addEventListener("input", render);

render();
</script>

</body>
</html>
