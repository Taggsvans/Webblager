<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagersaldo Mobil</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
* { box-sizing: border-box; }
:root { --bg:#f4f6f8; --card:#fff; --text:#1e293b; --accent:#008724; --border:#e5e7eb; }
body.dark { --bg:#0f172a; --card:rgba(255,255,255,0.05); --text:#fff; --border:rgba(255,255,255,0.1);}
body { margin:0; font-family:"Segoe UI"; background:var(--bg); color:var(--text);}
.container { padding:12px; max-width:600px; margin:auto; }
h2 { text-align:center; }
button { padding:12px; border:none; border-radius:10px; font-size:16px; width:100%; margin:5px 0; }
input { width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); margin-bottom:8px; font-size:16px; }
input::placeholder { opacity:0.6; }
.card { background:var(--card); border-radius:12px; padding:12px; margin-bottom:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.card.out { background:rgba(255,0,0,0.1);}
.small { font-size:13px; opacity:0.7; }
.meta { display:flex; justify-content:space-between; margin-top:6px; }
.status-ok { color:#22c55e; font-weight:bold;}
.status-out { color:#ef4444; font-weight:bold;}
#login-container { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; padding:20px;}
#productForm { display:none; }
#productForm.show { display:block; }
.actions { display:flex; gap:5px; margin-top:8px; }
.actions button { flex:1; }
.pick-btn { background:#f59e0b; color:#fff;}
.delete-btn { background:#ef4444; color:#fff;}
.camera-wrapper { display:flex; align-items:center; gap:5px; }
.camera-wrapper input { flex:1; }
.camera-wrapper button { flex:none; padding:10px 12px; margin-top:0; margin-bottom:8px; width:13%; }

/* CAMERA OVERLAY */
#cameraOverlay {
  display:none;
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center; align-items:center; flex-direction:column;
  z-index:9999;
}
#cameraOverlay #reader { width:90%; max-width:400px; border-radius:8px; background:#000; }
#cameraOverlay button { margin-top:12px; padding:10px 16px; border:none; border-radius:8px; background:#ef4444; color:white; font-size:16px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-container">
  <h2>🔒 Logga in</h2>
  <input id="login-username" placeholder="Användarnamn">
  <input id="login-password" type="password" placeholder="Lösenord">
  <button onclick="login()">Logga in</button>
</div>

<!-- APP -->
<div class="container" id="app-container" style="display:none;">
  <h2>📦 Lagersaldo</h2>
  <button onclick="toggleTheme()">🌙 Dark Mode</button>
  <button id="toggleFormBtn">➕ Ny produkt</button>

  <form id="productForm">
    <input id="nameInput" placeholder="Produktnamn" required>
    <div class="camera-wrapper">
      <input id="articleInput" placeholder="Artikelnummer" required>
      <button type="button" onclick="startScan('articleInput')">📷</button>
    </div>
    <input id="quantityInput" type="number" placeholder="Antal" required>
    <input id="locationInput" placeholder="Lagerplats" required>
    <button type="submit">+ Lägg till</button>
  </form>

  <input id="search" placeholder="🔍 Sök...">
  <div id="productList"></div>
</div>

<!-- CAMERA OVERLAY -->
<div id="cameraOverlay">
  <div id="reader"></div>
  <button onclick="stopScan()">❌ Avbryt</button>
</div>

<!-- LOAD HTML5-QRCODE AT THE END -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

<script>
// FIREBASE
const firebaseConfig = { apiKey:"AIzaSy...", authDomain:"lagersystem-4f0e6.firebaseapp.com", databaseURL:"https://lagersystem-4f0e6-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// DARK MODE
if(localStorage.getItem("darkMode")==="true") document.body.classList.add("dark");
function toggleTheme(){ document.body.classList.toggle("dark"); localStorage.setItem("darkMode", document.body.classList.contains("dark")); }

// LOGIN
function login(){
  const u=document.getElementById("login-username").value;
  const p=document.getElementById("login-password").value;
  if(u==="swapos301" && p==="ost"){ localStorage.setItem("loggedIn","true"); showApp(); } 
  else alert("Fel login");
}
function showApp(){
  document.getElementById("login-container").style.display="none";
  document.getElementById("app-container").style.display="block";
  loadProducts();
}
if(localStorage.getItem("loggedIn")==="true") showApp();

// FORM TOGGLE
const toggleBtn=document.getElementById("toggleFormBtn");
const productForm=document.getElementById("productForm");
toggleBtn.onclick=()=>{ productForm.classList.toggle("show"); };

// DATA
let products={};
function loadProducts(){
  db.ref("products").on("value", snap=>{ products=snap.val()||{}; render(); });
}
function save(){ db.ref("products").set(products); }
function sortedKeys(){ return Object.keys(products).sort((a,b)=>{ const locCompare=(products[a].location||"").trim().localeCompare((products[b].location||"").trim(),"sv"); if(locCompare!==0) return locCompare; return (products[a].name||"").localeCompare(products[b].name||"","sv"); }); }

// RENDER
function render(){
  const list=document.getElementById("productList");
  const search=document.getElementById("search").value.toLowerCase();
  list.innerHTML="";
  sortedKeys().forEach(key=>{
    const p=products[key];
    if(!(p.name||"").toLowerCase().includes(search) &&
       !(p.article||"").toLowerCase().includes(search) &&
       !(p.location||"").toLowerCase().includes(search)) return;

    const card=document.createElement("div");
    card.className="card";
    if(p.quantity===0) card.classList.add("out");

    card.innerHTML=`
      <input placeholder="Produktnamn" value="${p.name||""}" onblur="update('${key}','name',this.value)">
      <div class="camera-wrapper">
        <input placeholder="Artikelnummer" value="${p.article||""}" id="articleInput-${key}">
        <button type="button" onclick="startScan('articleInput-${key}')">📷</button>
      </div>
      <input placeholder="Antal" type="number" value="${p.quantity}" onblur="update('${key}','quantity',this.value)">
      <input placeholder="Lagerplats" value="${p.location||""}" onblur="update('${key}','location',this.value)">
      <input placeholder="Kommentar" value="${p.comment||""}" onblur="update('${key}','comment',this.value)">
      <div class="meta small">
        <div>Plockat: ${p.picked||0}</div>
        <div class="${p.quantity>0?'status-ok':'status-out'}">
          ${p.quantity>0?'Tillgänglig':'Slut'}
        </div>
      </div>
      <div class="actions">
        <button class="pick-btn" onclick="pick('${key}')">Plocka</button>
        <button class="delete-btn" onclick="del('${key}')">X</button>
      </div>
    `;
    list.appendChild(card);
  });
}

// UPDATE / ACTIONS / ADD
function update(key, field, value){ if(field==="quantity"){ value=parseInt(value)||0; } products[key][field]=value; save(); }
function pick(key){ if(products[key].quantity>0){ products[key].quantity--; products[key].picked=(products[key].picked||0)+1; save(); } }
function del(key){ delete products[key]; save(); }
productForm.addEventListener("submit",e=>{
  e.preventDefault();
  const key=Date.now();
  products[key]={ 
    name:document.getElementById("nameInput").value, 
    article:document.getElementById("articleInput").value, 
    quantity:parseInt(document.getElementById("quantityInput").value)||0, 
    location:document.getElementById("locationInput").value, 
    picked:0, comment:"" 
  };
  save(); e.target.reset(); productForm.classList.remove("show");
});
document.getElementById("search").addEventListener("input",render);

// CAMERA SCAN
let html5QrCodeInstance = null;
let currentInput = null;

function startScan(inputId){
  currentInput = document.getElementById(inputId);
  const overlay = document.getElementById("cameraOverlay");
  overlay.style.display = "flex";

  setTimeout(()=>{
    Html5Qrcode.getCameras().then(cameras=>{
      if(cameras && cameras.length){
        html5QrCodeInstance = new Html5Qrcode("reader");
        html5QrCodeInstance.start(
          { facingMode:"environment" },
          { fps:10, qrbox:250 },
          qrCodeMessage=>{
            if(currentInput) currentInput.value = qrCodeMessage;
            stopScan();
          },
          errorMessage=>{}
        ).catch(err=>{ console.error("Kamera startfel:", err); alert("Kunde inte starta kameran: "+err); });
      } else alert("Ingen kamera hittades");
    }).catch(err=>{ console.error("getCameras fel:", err); alert("Fel vid kamerainit: "+err); });
  }, 300);
}

function stopScan(){
  if(html5QrCodeInstance){
    html5QrCodeInstance.stop().then(()=> html5QrCodeInstance.clear());
    html5QrCodeInstance = null;
  }
  currentInput = null;
  document.getElementById("cameraOverlay").style.display = "none";
}
</script>

</body>
</html>
